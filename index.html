<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
  </head>
  <body>
    <style>
      @font-face {
        font-family: monogram;
        src: url(monogram.ttf);
      }

      body {
        font-family: monogram, monospace;
        font-size: 2rem;
        overflow: hidden;
      }


      .note-box {
      position: absolute;
      left: 5%;
      top: 1vh;

      background: rgb(127, 125, 125,0.7);
      color: white;

      padding: 1rem 1.5rem;
      border-radius: 10px;

      display: inline-block;
      backdrop-filter: blur(10px);

      filter: drop-shadow(0 0 0.5rem rgb(23, 23, 23));
    }


      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #textbox {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: 2vh;
        min-height: 10vh;
        background: white;
        border-radius: 3px;
        outline-style: solid;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: flex-start;
        word-spacing: 0.2rem;
        filter: drop-shadow(0 0 0.75rem rgb(112, 112, 112));
        /* overflow: auto; */
      }

      .ui-text {
        margin: 0;
        user-select: none;
      }

      .ui-close-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
      }

      .ui-about-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
        display: none;            
        text-decoration: none; 
      }

      .ui-Mod6-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
        display: none;            
        text-decoration: none; 
      }

      .ui-Mod7-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
        display: none;            
        text-decoration: none; 
      }

      .ui-Mod8A-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
        display: none;            
        text-decoration: none; 
      }

      .ui-Mod8B-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
        display: none;            
        text-decoration: none; 
      }

      .ui-tray-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
        display: none;            
        text-decoration: none; 
      }
      .ui-cont-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
        display: none;            
        text-decoration: none; 
      }
      .btn-container {
        align-self: flex-end;
        margin-top: 1rem;
      }

      .note {
        position: absolute;
        left: 5%;
        top: 1vh;
        display: flex;
        flex-direction: column;
        color: rgb(238, 238, 238);
      }
    </style>
    <div id="app">
      <div>
        <div class="note-box">
          <p>Welcome to my digital Portfolio,<br>
          my name is Marta Cillero</p>
        </div>

        <div id="textbox-container" style="display: none">
          <div id="textbox">
            <p id="dialogue" class="ui-text"></p>
            <div class="btn-container">
              <button id="close" class="ui-close-btn">Close</button>
              <button id="about_me" class="ui-about-btn">Know more ...</button>
              <button id="Mod6" class="ui-Mod6-btn">Know more ... </button>
              <button id="Mod7" class="ui-Mod7-btn">Know more ...</button>
              <button id="Mod8A" class="ui-Mod8A-btn">Know more... </button>
              <button id="Mod8B" class="ui-Mod8B-btn">Know more ... </button>
              <button id="tray" class="ui-tray-btn">Know more ... </button>
              <button id="cont" class="ui-cont-btn">Know more ...</button>
            </div>
          </div>
        </div>
      </div>
      <canvas id="game"></canvas>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
