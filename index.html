    <meta charset="UTF-8" />

    <style>
      @font-face {
        font-family: monogram;
        src: url(monogram.ttf);
      }



      #extraText {
        position: absolute;
        top: 60px;
        right: 0;
        width: 150px;
        background: rgba(127, 125, 125, 0.5);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(20px);
        padding: 1rem;
        border-radius: 8px;
        text-align: right;
      }


      #extraText p {
        margin: 0;
      }

      body {
        font-family: monogram, monospace;
        font-size: 2rem;
        overflow: hidden;
      }


      .note-box {
      position: absolute;
      left: 5%;
      top: 3vh;

      background: rgb(127, 125, 125,0.7);
      color: white;

      padding: 1rem 1.5rem;
      border-radius: 10px;

      display: inline-block;
      backdrop-filter: blur(10px);

      filter: drop-shadow(0 0 0.5rem rgb(23, 23, 23));
    }

    .menu-box {
      position: absolute;
      left: 93%;
      top: 3vh;

      background: rgb(127, 125, 125,0.7);
      color: white;

      padding: 1rem 1 rem;
      border-radius: 10px;

      display: inline-block;
      backdrop-filter: blur(10px);

      filter: drop-shadow(0 0 0.5rem rgb(23, 23, 23));
    }

    .-box {
      position: absolute;
      left: 5%;
      top: 20vh;

      background: rgb(127, 125, 125,0.7);
      color: white;

      padding: 1rem 1.5rem;
      border-radius: 10px;

      display: inline-block;
      backdrop-filter: blur(10px);

      filter: drop-shadow(0 0 0.5rem rgb(23, 23, 23));
    }

    .hidden {
        display: none;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #textbox {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: 2vh;
        min-height: 10vh;
        background: white;
        border-radius: 3px;
        outline-style: solid;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: flex-start;
        word-spacing: 0.2rem;
        filter: drop-shadow(0 0 0.75rem rgb(112, 112, 112));
        /* overflow: auto; */
      }

      .ui-text {
        margin: 0;
        user-select: none;
      }

      .ui-menu-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;           
        text-decoration: none; 

        background: transparent;   /* removes white button background */
        color: inherit;            /* uses menu-box text color */
        cursor: pointer;           /* makes it behave like a button */
      }

      .map-box {
      position: absolute;
      left: 5%;
      top: 21vh; /* below note-box */
      background: rgba(127, 125, 125, 0.7);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      display: inline-block; /* important: box fits content */
      backdrop-filter: blur(10px);
      filter: drop-shadow(0 0 0.5rem rgb(23, 23, 23));
      z-index: 10; /* ensure it's above the canvas */
    }

    <div id="app">
      <div>
