<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Information</title>
    <style>
      @font-face {
        font-family: monogram;
        src: url("/monogram.ttf");
      }

      body {
      font-family: monogram, monospace;
      font-size: 2rem;
      margin: 0;
      padding: 2rem;
      background: #8a8a8a;
      color: #faf8f8;
}

.back {
        display: inline-block;
        margin-bottom: 1rem;
        color: rgb(73, 72, 72);
        background: rgba(55, 54, 54, 0.08);
        text-decoration: none;
        border: 1px solid rgb(73, 72, 72);
        padding: 0.5rem 1rem;
        border-radius: 8px;
      }

/* WRAP */
.about__wrap {
  display: flex;
  gap: 2rem;
  align-items: center;
  max-width: 1100px;
  background: #7a7a7a;
  margin: 0 auto;
  padding: 1.5rem;
  border-radius: 12px;
  flex-wrap: wrap;          /* allows wrapping instead of overflow */
}


.about__avatar {
  width: min(420px, 100%);  /* never exceed 420px, but can shrink to fit */

  height: auto;
  object-fit: contain;   /* NO cropping */
  border-radius: 12px;
  flex: 0 1 420px;          /* plays nicely with flex */
}

/* TEXT area can shrink/grow properly */
.about__content {
  flex: 1 1 280px;          /* takes remaining space, but can wrap */
  min-width: 0;             /* prevents weird overflow in flex layouts */
}

/* PHONE / SMALL SCREENS */
@media (max-width: 700px) {
  body {
    padding: 1rem;
    font-size: 1.4rem;      /* optional: 2rem is huge on phones */
  }

  .about__wrap {
    flex-direction: column; /* stack image above text */
    align-items: stretch;
  }

  .about__avatar {
    width: 100%;
    max-width: 520px;       /* optional: keeps it from being massive on tablets */
    margin: 0 auto;
  }

}
    </style>
  </head>

  <body>
    <a class="back" href="/index.html">Back</a>

    <section class="about_me" id="about_me">
      <div class="about__wrap">

        <div class="about__content">
          <h2>Contact Information</h2>
          <h3>What do you prefer ?</h3>
            <p>- If you want to see my CV click <a href="https://drive.google.com/file/d/1lDpnEumsFYtqnwnyDJ_u6xxWTu6XQsHp/view?usp=sharing">here</a> <br>
            - If you want to write me an email click <a href="https://www.linkedin.com/feed/">here</a> <br>
            - If you want to see my Linkdn <a href="https://www.linkedin.com/feed/">here</a>. <br></p>
        </div>
      </div>
    </section>

   
  </body>
</html>
