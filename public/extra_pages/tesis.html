<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tesis</title>

    <style>
      @font-face {
        font-family: monogram;
        src: url("../monogram.ttf");
      }

      body {
        font-family: monogram, monospace;
        font-size: 2rem;
        margin: 0;
        padding: 2rem;
        background: #8a8a8a;
        color: #faf8f8;
      }

      .back {
        display: inline-block;
        margin-bottom: 1rem;
        color: rgb(73, 72, 72);
        background: rgba(55, 54, 54, 0.08);
        text-decoration: none;
        border: 1px solid rgb(73, 72, 72);
        padding: 0.5rem 1rem;
        border-radius: 8px;
      }

      /*  Layout: grid gallery (left) + text (right) */
      .Mod8B__wrap {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 3rem;

        max-width: 1100px;
        background: #7a7a7a;
        margin: 0 auto;
        padding: 1.5rem;
        border-radius: 12px;
        align-items: start;
      }

      /*  Replace column-count masonry with a real grid (prevents hover cropping) */
      .Mod8B__gallery {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        align-content: start;
      }

      .Mod8B__item {
        position: relative; /* enables z-index layering on hover */
      }

      .Mod8B__avatar {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
        object-fit: contain;
        transform-origin: center;
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      

      /*  Hover zoom that will NOT be cropped in a grid */
      .Mod8B__item:hover {
        z-index: 10;
      }

      .Mod8B__item:hover .Mod8B__avatar {
        transform: scale(1.4);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }

      /* TEXT area */
      .Mod8B__content {
        min-width: 0;
      }

      .Mod8B__content h2 {
        margin: 0 0 0.5rem;
      }
      .Mod8B__content p {
        margin: 0;
      }

      /* PHONE / SMALL SCREENS */
      @media (max-width: 700px) {
        body {
          padding: 1rem;
          font-size: 1.4rem;
        }

        .Mod8B__wrap {
          grid-template-columns: 1fr; /* stack gallery above text */
          gap: 1.25rem;
        }

        .Mod8B__gallery {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* Very small screens: 1 column gallery */
      @media (max-width: 420px) {
        .Mod8B__gallery {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <a class="back" href="../index.html">Back</a>

    <section class="Mod8B" id="Mod8B">
      <div class="Mod8B__wrap">
        <div class="Mod8B__content">
          <h2> info </h2>
    
        </div>
      </div>
    </section>
  </body>
</html>
